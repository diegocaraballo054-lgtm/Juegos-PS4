<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Progreso PS4 - Diego</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #121212;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    .grid-juegos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 1200px;
    }
    .card {
        background: #1e1e1e;
        border-radius: 12px;
        overflow: hidden;
        text-align: center;
        padding-bottom: 15px;
        border: 1px solid #333;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, opacity 0.3s ease;
        position: relative;
    }
    /* Animación al pasar el mouse */
    .card:hover {
        transform: scale(1.05);
        border-color: #007bff;
    }
    /* Estilo cuando el juego está marcado como pasado */
    .card.marcado {
        opacity: 0.5;
        border-color: #28a745;
    }
    .caratula {
        width: 100%;
        height: 230px;
        object-fit: cover;
        pointer-events: none; /* Para que no interfiera con el click */
    }
    .nombre {
        display: block;
        margin: 12px 5px;
        font-size: 14px;
        font-weight: bold;
        pointer-events: none;
    }
    .status-badge {
        font-size: 12px;
        color: #28a745;
        font-weight: bold;
        display: none;
    }
    .marcado .status-badge {
        display: block;
    }
    .buy-link {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #007bff; /* Color discreto */
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        transition: color 0.3s ease;
    }
    .buy-link:hover {
        color: #007bff; /* Se pone azul al pasar el mouse */
        text-decoration: underline;
    }

    /* Ajuste para móviles para que no se pegue al borde */
    @media (max-width: 600px) {
        .buy-link {
            position: static;
            margin-bottom: 20px;
        }
    }
    .contador-progreso {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #28a745;
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Para que en el celular no se amontone con el otro link */
    @media (max-width: 600px) {
        .contador-progreso {
            position: static;
            margin-top: 10px;
        }
    }
    .search-container {
        width: 100%;
        max-width: 400px;
        margin-bottom: 30px;
    }
    #buscador {
        width: 100%;
        padding: 12px 20px;
        border-radius: 25px;
        border: 1px solid #444;
        background-color: #1e1e1e;
        color: white;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }
    #buscador:focus {
        border-color: #007bff;
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
    }
</style>
</head>
<body>
<a href="https://dlpsgame.com/category/ps4/" class="buy-link" target="_blank">Descarga de juegos</a>
<div class="contador-progreso" id="contador">Juegos completados: 0 / 0</div>
<div class="search-container">
    <input type="text" id="buscador" placeholder="Buscar juego..." onkeyup="filtrarJuegos()">

        const contenedor = document.getElementById('contenedor');

     function actualizarContador() {
    const total = juegos.length;
    // Contamos cuántos tienen el estado 'true' en el localStorage
    let completados = 0;
    for(let i = 0; i < total; i++) {
        if(localStorage.getItem(`juego-${i}`) === 'true') {
            completados++;
        }
    }
    document.getElementById('contador').innerText = `Juegos completados: ${completados} / ${total}`;
}

function cargarJuegos() {
    contenedor.innerHTML = ""; 
    juegos.forEach((juego, index) => {
        const estaMarcado = localStorage.getItem(`juego-${index}`) === 'true';
        
        contenedor.innerHTML += `
            <div class="card ${estaMarcado ? 'marcado' : ''}" id="card-${index}" onclick="alternarEstado(${index})">
                <img src="${juego.img}" class="caratula" onerror="this.src='https://via.placeholder.com/200x300?text=Error+Link'">
                <span class="nombre">${juego.n}</span>
                <span class="status-badge">✓ PASADO</span>
            </div>
        `;
    });
    actualizarContador(); // Contamos al iniciar
}

function alternarEstado(id) {
    const tarjeta = document.getElementById(`card-${id}`);
    const nuevoEstado = !tarjeta.classList.contains('marcado');
    
    localStorage.setItem(`juego-${id}`, nuevoEstado);
    
    if (nuevoEstado) {
        tarjeta.classList.add('marcado');
    } else {
        tarjeta.classList.remove('marcado');
    }
    
    actualizarContador(); // Volvemos a contar después del click
}

// Esto vuelve a encender la lista con el nuevo sistema
cargarJuegos();

        function guardarEstado(id) {
            const checkbox = document.getElementById(`check-${id}`);
            localStorage.setItem(`juego-${id}`, checkbox.checked);
        }

        // ¡IMPORTANTE! Esto es lo que enciende la página
        cargarJuegos();
        function filtrarJuegos() {
    const texto = document.getElementById('buscador').value.toLowerCase();
    const tarjetas = document.querySelectorAll('.card');

    tarjetas.forEach(tarjeta => {
        // Buscamos el nombre dentro de la tarjeta
        const nombreJuego = tarjeta.querySelector('.nombre').innerText.toLowerCase();
        
        // Si el nombre incluye lo que escribimos, la mostramos; si no, la ocultamos
        if (nombreJuego.includes(texto)) {
            tarjeta.style.display = "block";
        } else {
            tarjeta.style.display = "none";
        }
    });
}
